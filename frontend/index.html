<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Chat App</title>

  <!-- Metadata -->
  <meta name="description" content="Realtime chat app with groups, direct messages, and friend system." />
  <meta name="keywords" content="chat, messaging, realtime, WebSocket, group chat, DMs" />
  <meta name="author" content="Tejas Singh" />
  <meta name="theme-color" content="#0a0a0a" />

  <!-- Open Graph -->
  <meta property="og:title" content="Group Chat App" />
  <meta property="og:description" content="Realtime chat with groups, DMs, and push notifications." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://chat-app-4x3l.onrender.com/" />
  <meta property="og:image" content="/icon-192.png" />

  <!-- Manifest & favicon -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/favicon.ico" />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Auth -->
  <div id="auth-section">
    <h2>Sign Up</h2>
    <input id="signup-username" type="text" placeholder="Username" autocomplete="username" />
    <input id="signup-password" type="password" placeholder="Password" autocomplete="new-password" />
    <button id="signup-btn" type="button">Sign Up</button>

    <h2>Sign In</h2>
    <input id="signin-username" type="text" placeholder="Username" autocomplete="username" />
    <input id="signin-password" type="password" placeholder="Password" autocomplete="current-password" />
    <button id="signin-btn" type="button">Sign In</button>
  </div>

  <!-- Main app -->
  <div id="app" class="hidden">
    <aside id="sidebar">
      <h3>Friends</h3>
      <ul id="friends-list"></ul>

      <h3>Friend Requests</h3>
      <ul id="friend-requests"></ul>

      <button id="add-friend-btn" type="button">➕ Add Friend</button>
      <button id="create-group-btn" type="button">➕ Create Group</button>
      <button id="dark-mode-btn" type="button">🌙 Toggle Dark</button>
      <button id="logout-btn" type="button">🚪 Logout</button>
    </aside>

    <main id="chat">
      <div id="chat-header">
        <h2 id="chat-title">Group Chat</h2>
      </div>
      <div id="messages"></div>
      <div id="typing-indicator" class="hidden"></div>
      <div id="chat-input">
        <input id="message-input" type="text" placeholder="Type a message..." />
        <button id="send-btn" type="button">Send</button>
      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/firebase-init.js"></script>
  <script defer src="/client.js"></script>
  <script defer src="/buttons.js"></script>
</body>
</html>
